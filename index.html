<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Izwi & Mzansi Works</title>
  <style>
    body {
      background: linear-gradient(135deg, #007A4D 0%, #FFB612 20%, #000 40%, #0066CC 60%, #FFFFFF 80%, #DE3831 100%);
      background-attachment: fixed;
      min-height: 100vh;
      margin: 0;
      font-family: Arial, sans-serif;
      padding: 20px;
    }
   .container {
      max-width: 800px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.95);
      padding: 20px;
      border-radius: 10px;
    }
    input, textarea, select, button {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
      box-sizing: border-box;
      font-size: 16px;
      color: #000;
      background: #fff;
    }
    select option {
      color: #000;
      background: #fff;
    }
    button {
      background: #0066CC;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover { opacity: 0.9; }
   .app-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      border-bottom: 2px solid #ddd;
    }
   .app-tab {
      padding: 12px 24px;
      cursor: pointer;
      border: none;
      background: none;
      font-size: 16px;
      font-weight: bold;
      color: #555;
    }
   .app-tab.active {
      border-bottom: 3px solid #0066CC;
      color: #0066CC;
    }
   .app-section { display: none; }
   .app-section.active { display: block; }
   .hidden { display: none; }

   .post-card {
      background: white;
      padding: 15px;
      margin: 10px 0;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }
   .post-card img {
      max-width: 100%;
      margin-top: 10px;
      border-radius: 5px;
    }
   .post-actions {
      display: flex;
      gap: 15px;
      margin-top: 10px;
      border-top: 1px solid #eee;
      padding-top: 10px;
    }
   .like-btn,.comment-btn {
      background: none;
      color: #0066CC;
      border: none;
      width: auto;
      padding: 5px;
      cursor: pointer;
      font-size: 14px;
    }
   .comment-section { margin-top: 10px; display: none; }
   .comment {
      background: #f5f5f5;
      padding: 8px;
      border-radius: 5px;
      margin: 5px 0;
      font-size: 14px;
    }
    #errorBanner {
      background: #ffebee;
      color: #c62828;
      padding: 10px;
      border-radius: 5px;
      margin-bottom: 15px;
      display: none;
      border: 1px solid #ef5350;
      font-size: 14px;
      white-space: pre-wrap;
    }
   .solution-box {
      background: #e8f5e9;
      border-left: 4px solid #4caf50;
      padding: 10px;
      margin-top: 10px;
      border-radius: 4px;
    }

   .mw-tabs { display: flex; gap: 10px; margin: 20px 0; border-bottom: 2px solid #eee; overflow-x: auto; }
   .mw-tab { padding: 10px 20px; cursor: pointer; border: none; background: none; font-size: 16px; white-space: nowrap; }
   .mw-tab.active { border-bottom: 3px solid #1a5d1a; font-weight: bold; color: #1a5d1a; }
   .job-card { border: 1px solid #ddd; padding: 15px; margin: 10px 0; border-radius: 8px; }
   .mw-btn { background: #1a5d1a; color: white; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; }
   .mw-btn:hover { background: #134813; }
   .auth-box { max-width: 400px; margin: 20px auto; }
   .job-count { font-size: 14px; color: #666; margin-left: 5px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🇿🇦 Izwi & Mzansi Works</h1>

    <div class="app-tabs">
      <button class="app-tab active" onclick="switchApp('izwi')">Izwi - Complaints</button>
      <button class="app-tab" onclick="switchApp('mw')">Mzansi Works - Jobs</button>
    </div>

    <!-- IZWI APP -->
    <div id="izwi-app" class="app-section active">
      <div id="errorBanner"></div>
      <p>The voice of South Africa</p>

      <div id="authSection">
        <input id="email" type="email" placeholder="Email">
        <input id="password" type="password" placeholder="Password">
        <input id="displayName" type="text" placeholder="Display Name - leave blank for Anonymous">
        <button id="loginBtn">Login</button>
        <button id="signupBtn">Sign Up</button>
      </div>

      <div id="postSection" style="display:none;">
        <p>Logged in as: <span id="userEmail"></span> <button id="logoutBtn" style="width:auto; padding:5px 15px;">Logout</button></p>

        <p><strong>Post as:</strong></p>
        <label><input type="radio" name="postAs" value="name" checked> Your Name</label>
        <label><input type="radio" name="postAs" value="anonymous"> Anonymous</label>

        <select id="postType">
          <option value="Load shedding">Load shedding</option>
          <option value="Water">Water</option>
          <option value="Roads">Roads</option>
          <option value="Healthcare">Healthcare</option>
          <option value="Safety & Security">Safety & Security</option>
          <option value="Other">Other</option>
        </select>

        <input id="location" type="text" placeholder="Location/Suburb">
        <input id="title" type="text" placeholder="Title">
        <textarea id="desc" placeholder="Describe the issue" rows="4"></textarea>
        <input id="problem" type="text" placeholder="Problem">
        <input id="solution" type="text" placeholder="Solution">
        <input id="fileInput" type="file" accept="image/*,application/pdf">
        <button id="postBtn">Post Complaint</button>
      </div>

      <h3>Recent Complaints</h3>
      <div id="posts">Loading...</div>
      <div id="status"></div>
    </div>

    <!-- MZANSI WORKS APP -->
    <div id="mw-app" class="app-section">
      <p>Find paid work in your community</p>

      <div id="mw-auth-section" class="auth-box">
        <input type="email" id="mw-email" placeholder="Email">
        <input id="mw-password" type="password" placeholder="Password">
        <button class="mw-btn" onclick="mwSignUp()">Sign Up</button>
        <button class="mw-btn" onclick="mwSignIn()">Login</button>
      </div>

      <div id="mw-app-section" class="hidden">
        <p>Logged in as: <span id="mw-user-email"></span> <button onclick="mwSignOut()">Logout</button></p>

        <div class="mw-tabs" id="mw-tabs"></div>

        <div id="mw-jobs-list"></div>

        <div id="mw-post-job-form" class="hidden">
          <h3>Post a Job</h3>
          <input id="mw-job-title" placeholder="Job Title">
          <select id="mw-job-category">
            <option value="public_works">Public Works</option>
            <option value="micro_project">Micro-Projects</option>
            <option value="retail">Retail & Hospitality</option>
            <option value="domestic">Domestic & Care</option>
            <option value="student_gig">Student Gigs</option>
            <option value="skilled">Skilled Freelance</option>
            <option value="farm">Farm & Agri</option>
            <option value="rehab">Rehab-to-Work</option>
          </select>
          <input id="mw-job-location" placeholder="Location">
          <input id="mw-job-pay" type="number" placeholder="Pay Amount">
          <select id="mw-job-pay-type">
            <option value="per_day">Per Day</option>
            <option value="per_hour">Per Hour</option>
            <option value="per_month">Per Month</option>
          </select>
          <textarea id="mw-job-desc" placeholder="Description"></textarea>
          <button class="mw-btn" onclick="mwCreateJob()">Post Job</button>
          <button class="mw-btn" onclick="mwHidePostJob()" style="background:#666; margin-top:5px;">Cancel</button>
        </div>
      </div>
    </div>
  </div>

<script type="module">
/* ============ APP SWITCHER ============ */
window.switchApp = (app) => {
  document.querySelectorAll('.app-tab').forEach(t => t.classList.remove('active'))
  document.querySelectorAll('.app-section').forEach(s => s.classList.remove('active'))
  if (app === 'izwi') {
    document.querySelectorAll('.app-tab')[0].classList.add('active')
    document.getElementById('izwi-app').classList.add('active')
  } else {
    document.querySelectorAll('.app-tab')[1].classList.add('active')
    document.getElementById('mw-app').classList.add('active')
  }
}

/* ============ FIREBASE INIT ============ */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc, query, where, orderBy, onSnapshot, serverTimestamp, doc, updateDoc, increment, arrayUnion, getDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyC_2XusB3B4EQdzn9S7BpFRw8f1xdGonhs",
  authDomain: "izwi-c22f3.firebaseapp.com",
  projectId: "izwi-c22f3",
  storageBucket: "izwi-c22f3.firebasestorage.app",
  messagingSenderId: "249797256658",
  appId: "1:249797256658:web:71c792dcc5cbe81159d40b"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

function showError(msg) {
  const banner = document.getElementById('errorBanner');
  banner.style.display = 'block';
  banner.textContent = msg;
}

/* ============ IZWI - COMPLAINTS ============ */
onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById('userEmail').innerText = user.displayName || user.email;
    document.getElementById('authSection').style.display = 'none';
    document.getElementById('postSection').style.display = 'block';
  } else {
    document.getElementById('authSection').style.display = 'block';
    document.getElementById('postSection').style.display = 'none';
  }
});

document.getElementById('loginBtn').onclick = async () => {
  try {
    await signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value);
  } catch (e) {
    showError("Login failed: " + e.message);
  }
};

document.getElementById('signupBtn').onclick = async () => {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  try {
    const userCred = await createUserWithEmailAndPassword(auth, email, password);
    await updateProfile(userCred.user, { displayName: document.getElementById('displayName').value || 'Anonymous' });
  } catch (e) {
    if (e.code === 'auth/email-already-in-use') {
      showError("This email is already registered. Try logging in instead.");
    } else {
      showError("Signup failed: " + e.message);
    }
  }
};

document.getElementById('logoutBtn').onclick = () => signOut(auth);

document.getElementById('postBtn').onclick = async () => {
  const user = auth.currentUser;
  if (!user) return showError("Log in first");

  const postAs = document.querySelector('input[name="postAs"]:checked').value;
  const authorName = postAs === 'anonymous'? 'Anonymous' : (user.displayName || user.email);

  try {
    const file = document.getElementById('fileInput').files[0];
    let fileURL = null;

    if (file) {
      const storageRef = ref(storage, `complaints/${Date.now()}_${file.name}`);
      const snapshot = await uploadBytes(storageRef, file);
      fileURL = await getDownloadURL(snapshot.ref);
    }

    await addDoc(collection(db, "complaints"), {
      type: document.getElementById('postType').value,
      location: document.getElementById('location').value,
      title: document.getElementById('title').value,
      description: document.getElementById('desc').value,
      problem: document.getElementById('problem').value,
      solution: document.getElementById('solution').value,
      fileURL: fileURL,
      author: authorName,
      authorId: user.uid,
      createdAt: serverTimestamp(),
      likes: 0,
      likedBy: [],
      comments: []
    });

    alert("Posted!");
    document.getElementById('title').value = '';
    document.getElementById('desc').value = '';
    document.getElementById('location').value = '';
    document.getElementById('problem').value = '';
    document.getElementById('solution').value = '';
    document.getElementById('fileInput').value = '';
  } catch (e) {
    showError("Error posting: " + e.message);
  }
};

const q = query(collection(db, "complaints"), orderBy("createdAt", "desc"));

onSnapshot(q,
  (snapshot) => {
    document.getElementById('errorBanner').style.display = 'none';
    const postsDiv = document.getElementById('posts');

    if (snapshot.empty) {
      postsDiv.innerHTML = '<p>No posts yet. Be the first to post!</p>';
      document.getElementById('status').textContent = '';
      return;
    }

    document.getElementById('status').textContent = `Loaded ${snapshot.size} posts`;

    let html = '';
    snapshot.forEach(docSnap => {
      const d = docSnap.data();
      const id = docSnap.id;
      const date = (d.createdAt && typeof d.createdAt.toDate === 'function')
? d.createdAt.toDate().toLocaleString()
        : "Just now";

      const commentsHTML = (d.comments || []).map(c =>
        `<div class="comment"><strong>${c.author}:</strong> ${c.text}</div>`
      ).join('');

      const fileHTML = d.fileURL?
        (d.fileURL.match(/\.(jpg|jpeg|png|gif|webp)$/i)
? `<img src="${d.fileURL}" alt="attachment">`
          : `<a href="${d.fileURL}" target="_blank">View attachment</a>`)
        : '';

      html += `
        <div class="post-card">
          <strong>${d.title || ''}</strong> - ${d.type || ''}<br>
          ${d.problem? `<strong>Problem:</strong> ${d.problem}<br>` : ''}
          ${d.description || ''}<br>
          ${fileHTML}
          ${d.solution? `<div class="solution-box"><strong>Solution:</strong> ${d.solution}</div>` : ''}
          <small>Posted by ${d.author || 'Anonymous'} • ${d.location || ''} • ${date}</small>
          <div class="post-actions">
            <button class="like-btn" onclick="likePost('${id}')">👍 Like (${d.likes || 0})</button>
            <button class="comment-btn" onclick="toggleComments('${id}')">💬 Comment (${(d.comments || []).length})</button>
          </div>
          <div class="comment-section" id="comments-${id}">
            ${commentsHTML}
            <input type="text" id="comment-input-${id}" placeholder="Write a comment...">
            <button onclick="addComment('${id}')">Post Comment</button>
          </div>
        </div>
      `;
    });

    postsDiv.innerHTML = html;
  },
  (error) => {
    showError(`Firestore Error: ${error.code}\n${error.message}`);
  }
);

window.likePost = async (postId) => {
  const user = auth.currentUser;
  if (!user) return showError("Log in to like posts");
  try {
    const postRef = doc(db, "complaints", postId);
    const postSnap = await getDoc(postRef);
    if (!postSnap.exists()) return;
    if ((postSnap.data().likedBy || []).includes(user.uid)) {
      return alert("You've already liked this");
    }
    await updateDoc(postRef, {
      likes: increment(1),
      likedBy: arrayUnion(user.uid)
    });
  } catch (e) {
    showError("Error liking: " + e.message);
  }
};

window.toggleComments = (postId) => {
  const section = document.getElementById(`comments-${postId}`);
  section.style.display = section.style.display === 'block'? 'none' : 'block';
};

window.addComment = async (postId) => {
  const user = auth.currentUser;
  if (!user) return showError("Log in to comment");
  const input = document.getElementById(`comment-input-${postId}`);
  const text = input.value.trim();
  if (!text) return;
  try {
    await updateDoc(doc(db, "complaints", postId), {
      comments: arrayUnion({
        author: user.displayName || user.email,
        text: text,
        createdAt: new Date().toISOString()
      })
    });
    input.value = '';
  } catch (e) {
    showError("Error commenting: " + e.message);
  }
};

/* ============ MZANSI WORKS - FIRESTORE ============ */
const mwCategories = [
  { id: 'public_works', name: 'Public Works' },
  { id: 'micro_project', name: 'Micro-Projects' },
  { id: 'retail', name: 'Retail & Hospitality' },
  { id: 'domestic', name: 'Domestic & Care' },
  { id: 'student_gig', name: 'Student Gigs' },
  { id: 'skilled', name: 'Skilled Freelance' },
  { id: 'farm', name: 'Farm & Agri' },
  { id: 'rehab', name: 'Rehab-to-Work' }
];

let mwCurrentTab = 'public_works';
let mwUnsubscribe = null;
let mwJobCounts = {};

onAuthStateChanged(auth, (user) => {
  if (user && document.getElementById('mw-app').classList.contains('active')) {
    mwShowApp(user)
  }
})

window.mwSignUp = async () => {
  const email = document.getElementById('mw-email').value
  const password = document.getElementById('mw-password').value
  try {
    await createUserWithEmailAndPassword(auth, email, password)
    alert('Account created! You are now logged in.')
  } catch (e) {
    if (e.code === 'auth/email-already-in-use') {
      alert('This email is already registered. Logging you in instead.');
      try {
        await signInWithEmailAndPassword(auth, email, password)
      } catch (err) {
        alert(err.message)
      }
    } else {
      alert(e.message)
    }
  }
}

window.mwSignIn = async () => {
  const email = document.getElementById('mw-email').value
  const password = document.getElementById('mw-password').value
  try {
    const { user } = await signInWithEmailAndPassword(auth, email, password)
    mwShowApp(user)
  } catch (e) {
    alert(e.message)
  }
}

window.mwSignOut = async () => {
  await signOut(auth)
  document.getElementById('mw-auth-section').classList.remove('hidden')
  document.getElementById('mw-app-section').classList.add('hidden')
  if (mwUnsubscribe) mwUnsubscribe()
}

async function mwShowApp(user) {
  document.getElementById('mw-auth-section').classList.add('hidden')
  document.getElementById('mw-app-section').classList.remove('hidden')
  document.getElementById('mw-user-email').innerText = user.email

  await mwLoadJobCounts();
  mwBuildTabs();
  mwLoadJobs(mwCurrentTab);
}

function mwBuildTabs() {
  const tabsDiv = document.getElementById('mw-tabs');
  tabsDiv.innerHTML = '';

  mwCategories.forEach((cat, i) => {
    const btn = document.createElement('button');
    btn.className = 'mw-tab' + (cat.id === mwCurrentTab? ' active' : '');
    btn.innerHTML = `${cat.name} <span class="job-count">(${mwJobCounts[cat.id] || 0})</span>`;
    btn.onclick = () => mwSwitchTab(cat.id, btn);
    tabsDiv.appendChild(btn);
  });

  const postBtn = document.createElement('button');
  postBtn.className = 'mw-tab';
  postBtn.textContent = '+ Post a Job';
  postBtn.onclick = mwShowPostJob;
  tabsDiv.appendChild(postBtn);
}

async function mwLoadJobCounts() {
  const snapshot = await getDocs(collection(db, "jobs"));
  mwJobCounts = {};

  snapshot.forEach(doc => {
    const job = doc.data();
    if (job.status === 'open') {
      mwJobCounts[job.category] = (mwJobCounts[job.category] || 0) + 1;
    }
  });
}

window.mwSwitchTab = (tab, btn) => {
  mwCurrentTab = tab;
  document.querySelectorAll('.mw-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('mw-post-job-form').classList.add('hidden');
  mwLoadJobs(tab);
}

window.mwShowPostJob = () => {
  document.getElementById('mw-post-job-form').classList.remove('hidden');
  document.getElementById('mw-jobs-list').innerHTML = '';
}

window.mwHidePostJob = () => {
  document.getElementById('mw-post-job-form').classList.add('hidden');
}

window.mwCreateJob = async () => {
  const user = auth.currentUser
  if (!user) return alert("Log in first")

  const title = document.getElementById('mw-job-title').value
  if (!title) return alert("Enter a job title")

  try {
    await addDoc(collection(db, "jobs"), {
      employerId: user.uid,
      employerEmail: user.email,
      title: title,
      category: document.getElementById('mw-job-category').value,
      location: document.getElementById('mw-job-location').value,
      payAmount: Number(document.getElementById('mw-job-pay').value) || 0,
      payType: document.getElementById('mw-job-pay-type').value,
      description: document.getElementById('mw-job-desc').value,
      status: 'open',
      createdAt: serverTimestamp(),
      applications: []
    })
    alert('Job posted!')
    document.getElementById('mw-post-job-form').classList.add('hidden')
    document.getElementById('mw-job-title').value = '';
    document.getElementById('mw-job-location').value = '';
    document.getElementById('mw-job-pay').value = '';
    document.getElementById('mw-job-desc').value = '';

    await mwLoadJobCounts();
    mwBuildTabs();
    mwLoadJobs(mwCurrentTab);
  } catch (e) {
    alert("Error posting job: " + e.message)
  }
}

function mwLoadJobs(category) {
  if (mwUnsubscribe) mwUnsubscribe()

  const q = query(
    collection(db, "jobs"),
    where("category", "==", category),
    where("status", "==", "open"),
    orderBy("createdAt", "desc")
  )

  mwUnsubscribe = onSnapshot(q, (snapshot) => {
    const jobsDiv = document.getElementById('mw-jobs-list')
    if (snapshot.empty) {
      jobsDiv.innerHTML = '<p>No jobs yet in this category. Be the first to post!</p>'
      return
    }

    let html = ''
    snapshot.forEach(docSnap => {
      const job = docSnap.data()
      html += `
        <div class="job-card">
          <h3>${job.title}</h3>
          <p><strong>Location:</strong> ${job.location || 'Not specified'}</p>
          <p><strong>Pay:</strong> R${job.payAmount} ${job.payType.replace('_', '/')}</p>
          <p>${job.description}</p>
          <button class="mw-btn" onclick="mwApplyJob('${docSnap.id}')">Apply Now</button>
        </div>
      `
    })
    jobsDiv.innerHTML = html
  }, (err) => {
    console.error(err)
    jobsDiv.innerHTML = '<p>Error loading jobs. Check Firestore rules.</p>'
  })
}

window.mwApplyJob = async (jobId) => {
  const user = auth.currentUser
  if (!user) return alert("Please log in first to apply")

  try {
    const jobRef = doc(db, "jobs", jobId)
    const jobSnap = await getDoc(jobRef)

    if (!jobSnap.exists()) {
      return alert("Job no longer exists")
    }

    const applications = jobSnap.data().applications || []
    const alreadyApplied = applications.some(a => a.userId === user.uid)

    if (alreadyApplied) {
      return alert("You've already applied for this job")
    }

    await updateDoc(jobRef, {
      applications: arrayUnion({
        userId: user.uid,
        email: user.email,
        appliedAt: new Date().toISOString()
      })
    })
    alert('Application sent successfully!')
  } catch (e) {
    alert("Error applying: " + e.message)
  }
}
</script>
</body>
</html>
