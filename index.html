<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_AUTH_DOMAIN",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_STORAGE_BUCKET",
    messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
    appId: "YOUR_APP_ID"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  console.log("App starting...");

  const complaintsCol = collection(db, "complaints");
  
  // Removed the where() filter so posts with createdAt: null will show
  const q = query(complaintsCol, orderBy("createdAt", "desc"));

  onSnapshot(q, (snapshot) => {
    console.log("Snapshot received, docs:", snapshot.size);
    const list = document.getElementById("complaintsList");
    list.innerHTML = "";
    
    snapshot.forEach(doc => {
      const data = doc.data();
      const div = document.createElement("div");
      div.className = "complaint";
      
      const date = data.createdAt ? new Date(data.createdAt.seconds * 1000).toLocaleString() : "Just now";
      
      div.innerHTML = `
        <strong>${data.author || "Anonymous"}</strong> - ${date}<br>
        <strong>${data.title}</strong><br>
        ${data.location}<br>
        ${data.description}
      `;
      list.appendChild(div);
    });
  });

  document.getElementById("postBtn").onclick = async () => {
    const title = document.getElementById("title").value;
    const location = document.getElementById("location").value;
    const description = document.getElementById("description").value;
    const author = document.querySelector('input[name="authorType"]:checked').value === "name" 
      ? auth.currentUser.email 
      : "Anonymous";

    console.log("Posting complaint...");
    await addDoc(complaintsCol, {
      title,
      location,
      description,
      author,
      createdAt: serverTimestamp()
    });
    
    document.getElementById("title").value = "";
    document.getElementById("location").value = "";
    document.getElementById("description").value = "";
  };

  onAuthStateChanged(auth, user => {
    console.log("Auth state changed:", user ? user.email : "logged out");
    document.getElementById("userEmail").textContent = user ? user.email : "";
  });

  document.getElementById("logoutBtn").onclick = () => signOut(auth);
</script>
