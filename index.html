<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Izwi - Complaints</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 20px auto;
      padding: 0 15px;
      background: #f5f5f5;
    }
    h1 {
      text-align: center;
      color: #333;
    }
    .form-container, .complaint {
      background: white;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ddd;
      border-radius: 5px;
      box-sizing: border-box;
      font-family: inherit;
    }
    button {
      background: #007bff;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover {
      background: #0056b3;
    }
    .complaint strong {
      color: #007bff;
    }
    .user-info {
      text-align: right;
      margin-bottom: 10px;
      font-size: 14px;
    }
    .author-options {
      margin: 10px 0;
    }
    .author-options label {
      margin-right: 20px;
    }
  </style>
</head>
<body>
  <h1>Izwi Complaints</h1>
  
  <div class="user-info">
    <span id="userEmail"></span>
    <button id="logoutBtn" style="display:none;">Logout</button>
  </div>

  <div class="form-container">
    <input type="text" id="title" placeholder="Title">
    <input type="text" id="location" placeholder="Location">
    <textarea id="description" placeholder="Describe the issue" rows="4"></textarea>
    
    <div class="author-options">
      <label><input type="radio" name="authorType" value="anonymous" checked> Post as Anonymous</label>
      <label><input type="radio" name="authorType" value="name"> Post with Email</label>
    </div>
    
    <button id="postBtn">Post Complaint</button>
  </div>

  <div id="complaintsList"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // REPLACE THESE WITH YOUR REAL FIREBASE CONFIG
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_AUTH_DOMAIN",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_STORAGE_BUCKET",
      messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    console.log("App starting...");

    const complaintsCol = collection(db, "complaints");
    
    // No where() filter - shows ALL posts including old ones with createdAt: null
    const q = query(complaintsCol, orderBy("createdAt", "desc"));

    onSnapshot(q, (snapshot) => {
      console.log("Snapshot received, docs:", snapshot.size);
      const list = document.getElementById("complaintsList");
      list.innerHTML = "";
      
      snapshot.forEach(doc => {
        const data = doc.data();
        const div = document.createElement("div");
        div.className = "complaint";
        
        // Handle null createdAt for old posts
        const date = data.createdAt 
          ? new Date(data.createdAt.seconds * 1000).toLocaleString() 
          : "Just now";
        
        div.innerHTML = `
          <strong>${data.author || "Anonymous"}</strong> - ${date}<br>
          <strong>${data.title || ""}</strong><br>
          ${data.location || ""}<br>
          ${data.description || ""}
        `;
        list.appendChild(div);
      });
    });

    document.getElementById("postBtn").onclick = async () => {
      const title = document.getElementById("title").value.trim();
      const location = document.getElementById("location").value.trim();
      const description = document.getElementById("description").value.trim();
      
      if (!title || !location || !description) {
        alert("Please fill all fields");
        return;
      }

      const author = document.querySelector('input[name="authorType"]:checked').value === "name" 
        ? auth.currentUser?.email || "Anonymous"
        : "Anonymous";

      console.log("Posting complaint...");
      await addDoc(complaintsCol, {
        title,
        location,
        description,
        author,
        createdAt: serverTimestamp()
      });
      
      document.getElementById("title").value = "";
      document.getElementById("location").value = "";
      document.getElementById("description").value = "";
    };

    onAuthStateChanged(auth, user => {
      console.log("Auth state changed:", user ? user.email : "logged out");
      document.getElementById("userEmail").textContent = user ? `Logged in as: ${user.email}` : "";
      document.getElementById("logoutBtn").style.display = user ? "inline-block" : "none";
    });

    document.getElementById("logoutBtn").onclick = () => signOut(auth);
  </script>
</body>
</html>
